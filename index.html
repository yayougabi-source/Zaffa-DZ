<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaffa DZ | زفة دي زاد</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary-purple: #4A148C;
            /* بنفسجي ملكي */
            --secondary-gold: #D4AF37;
            /* ذهبي متزن */
            --light-gold: #FDF5E6;
            /* ذهبي فاتح جداً للخلفيات */
            --white: #FFFFFF;
            --text-dark: #333333;
            --text-light: #757575;
            --shadow-soft: 0 4px 15px rgba(0, 0, 0, 0.05);

            /* إعدادات الحواف الدائرية */
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;

            /* الخطوط الافتراضية */
            --font-ar: 'Noto Sans Arabic', sans-serif;
            --font-fr: 'Poppins', sans-serif;
        }

        /* استيراد الخطوط من Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Poppins:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
            /* تأثير ناعم لكل الانتقالات */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Nav */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        .logo img {
            height: 48px;
            border-radius: 12px;
        }

        .lang-switch {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lang-switch:hover {
            background: var(--primary-color);
            color: var(--text-light);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-owner {
            background: linear-gradient(135deg, var(--secondary-color), #b8962e);
            color: #fff;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            font-family: inherit;
            font-size: 0.95rem;
        }

        .btn-owner:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4);
            filter: brightness(1.05);
        }

        .top-bar {
            background-color: var(--primary-color);
            color: #fff;
            padding: 8px 4rem;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
        }

        .top-bar-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .top-bar-info span {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .top-bar-info i {
            color: var(--secondary-color);
            font-size: 1.1rem;
        }

        .ticker-wrap {
            background-color: var(--secondary-color);
            color: #fff;
            padding: 10px 0;
            font-size: 1.05rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        /* Search Bar */
        .search-bar-container {
            max-width: 1000px;
            margin: -4rem auto 4rem;
            background: var(--surface-color);
            padding: 1.5rem 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 10;
            display: grid;
            grid-template-columns: repeat(3, 1fr) auto;
            gap: 1.5rem;
            align-items: end;
        }

        .search-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .search-input-group label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input-group label i {
            color: var(--secondary-color);
        }

        .search-input-group select,
        .search-input-group input {
            padding: 0.9rem 1.2rem;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: var(--transition);
            background-color: #fcfcfc;
        }

        .search-input-group select:focus,
        .search-input-group input:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .btn-search {
            height: auto;
            padding: 0.9rem 2.5rem;
            background: linear-gradient(135deg, var(--primary-color), #2d0b40);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(83, 28, 112, 0.2);
            font-family: inherit;
        }

        .btn-search:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(83, 28, 112, 0.3);
        }

        /* Wishlist & Amenities */
        .btn-wishlist {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 3;
            transition: var(--transition);
            font-size: 1.2rem;
            color: #ccc;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(4px);
        }

        body[lang="fr"] .btn-wishlist {
            left: auto;
            right: 20px;
        }

        .btn-wishlist:hover {
            transform: scale(1.1);
        }

        .btn-wishlist.active {
            color: #ff4b4b;
            animation: heartPulse 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes heartPulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }

        .amenities-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            color: #666;
            font-size: 0.95rem;
            flex-wrap: wrap;
        }

        .amenity {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #fdfdfd;
            padding: 6px 12px;
            border-radius: 50px;
            border: 1px solid #f0f0f0;
            font-weight: 600;
        }

        .amenity i {
            color: var(--secondary-color);
        }

        /* Floating WhatsApp */
        .floating-whatsapp {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25D366;
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            z-index: 1000;
            text-decoration: none;
            transition: var(--transition);
            animation: pulse-wa 2s infinite;
        }

        body[lang="fr"] .floating-whatsapp {
            right: auto;
            left: 30px;
        }

        .floating-whatsapp:hover {
            transform: scale(1.1);
            animation: none;
        }

        @keyframes pulse-wa {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(37, 211, 102, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);
            }
        }

        /* Hero */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 8rem 2rem 6rem;
            background: linear-gradient(135deg, rgba(83, 28, 112, 0.05) 0%, rgba(212, 175, 55, 0.05) 100%);
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -5%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(83, 28, 112, 0.08) 0%, rgba(255, 255, 255, 0) 70%);
            border-radius: 50%;
            z-index: -1;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero h2 {
            font-size: 2.25rem;
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .hero p {
            font-size: 1.25rem;
            color: #555;
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .btn-primary {
            background: var(--primary-color);
            color: var(--text-light);
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(83, 28, 112, 0.2);
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(83, 28, 112, 0.3);
            background: #6a2491;
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 1.2rem 3rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-secondary:hover {
            background: rgba(83, 28, 112, 0.05);
            transform: translateY(-5px);
        }

        .hero-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Halls Grid */
        .halls-section {
            padding: 6rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 4rem;
            font-weight: 800;
        }

        .halls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 3rem;
        }

        .hall-card {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            transition: var(--transition);
            border: 1px solid rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .hall-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(83, 28, 112, 0.12);
        }

        .hall-img {
            width: 100%;
            height: 250px;
            overflow: hidden;
            position: relative;
        }

        .hall-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hall-tag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--secondary-color);
            color: #fff;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            z-index: 2;
        }

        body[lang="fr"] .badge {
            right: auto;
            left: 20px;
        }

        .hall-content {
            padding: 2.5rem;
        }

        .hall-title {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 0.75rem;
        }

        .hall-location {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hall-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f0f0f0;
            padding-top: 1.5rem;
        }

        .price-label {
            font-size: 0.9rem;
            color: #888;
            display: block;
        }

        .price {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--secondary-color);
        }

        /* Booking Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
            padding: 1rem;
        }

        .booking-modal {
            background: var(--surface-color);
            border-radius: var(--border-radius);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 2.5rem;
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            color: #999;
            cursor: pointer;
            transition: var(--transition);
        }

        body[lang="fr"] .close-modal {
            right: auto;
            left: 20px;
        }

        .close-modal:hover {
            color: #ff4b4b;
            transform: scale(1.1);
        }

        .modal-title {
            font-size: 1.6rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-hall {
            color: var(--secondary-color);
            font-weight: 700;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
            font-size: 1.1rem;
        }

        /* Calendar Grid */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .calendar-header button {
            background: #f0f0f0;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .calendar-header button:hover {
            background: #e0e0e0;
        }

        .calendar-days-label {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 2rem;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #eee;
            transition: var(--transition);
        }

        .calendar-day:not(.unavailable):not(.empty):hover {
            border-color: var(--secondary-color);
            background: #fff8eb;
        }

        .calendar-day.selected {
            background: var(--secondary-color);
            color: #fff;
            border-color: var(--secondary-color);
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3);
        }

        .calendar-day.unavailable {
            background: #fafafa;
            color: #ccc;
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .calendar-day.empty {
            border: none;
            cursor: default;
        }

        /* Payment Options */
        .payment-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .payment-card {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .payment-card:hover,
        .payment-card.selected {
            border-color: var(--primary-color);
            background: #fbf8fc;
        }

        .payment-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            color: #333;
        }

        .payment-info i {
            font-size: 1.5rem;
        }

        .payment-card.selected .payment-info i {
            color: var(--primary-color);
        }

        .booking-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-confirm {
            flex: 1;
            background: linear-gradient(135deg, var(--secondary-color), #b8962e);
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .btn-confirm:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .btn-confirm:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-cancel {
            background: #f5f5f5;
            color: #666;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        /* Footer */
        .footer {
            background: var(--primary-color);
            color: var(--text-light);
            padding: 5rem 4rem 2rem;
            margin-top: 2rem;
            border-top-left-radius: 50px;
            border-top-right-radius: 50px;
        }

        .footer-slogan {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
        }

        .social-link {
            color: #ffffff;
            font-size: 1.8rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            text-decoration: none;
        }

        .social-link.instagram {
            background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
        }

        .social-link.tiktok {
            background: #000000;
        }

        .social-link.whatsapp {
            background: #25D366;
        }

        .social-link.gps {
            background: #ea4335;
            /* Google Maps Pin Red */
        }

        .social-link:hover {
            color: #ffffff;
            transform: translateY(-8px);
            filter: brightness(1.15);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }

        .copyright {
            text-align: center;
            opacity: 0.8;
            font-size: 1rem;
        }

        .hide-mobile {
            display: inline-block;
        }

        @media (max-width: 768px) {
            .search-bar-container {
                grid-template-columns: 1fr;
                margin: -3rem 1.5rem 3rem;
                gap: 1.2rem;
                padding: 1.5rem;
            }

            .btn-search {
                padding: 1.2rem;
            }

            .top-bar {
                flex-direction: column;
                gap: 10px;
                padding: 10px 1rem;
                text-align: center;
            }

            .top-bar-info {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }

            .hide-mobile {
                display: none;
            }

            .btn-owner {
                padding: 0.6rem;
                justify-content: center;
            }

            .navbar {
                padding: 1.5rem 1rem;
            }

            .nav-actions {
                gap: 0.5rem;
            }

            .hero {
                padding: 6rem 1.5rem 4rem;
            }

            .hero h1 {
                font-size: 2.8rem;
            }

            .hero h2 {
                font-size: 1.8rem;
            }

            .hero-buttons {
                flex-direction: column;
                width: 100%;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                justify-content: center;
            }

            .halls-section {
                padding: 4rem 2rem;
            }

            .footer {
                padding: 4rem 2rem 2rem;
                border-top-left-radius: 30px;
                border-top-right-radius: 30px;
            }

            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body class="lang-ar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // بيانات الواجهة النصية (Translations)
        const content = {
            ar: {
                sloganHtml: <>نظم حفلتك بسهولة<br />احجز و خلي الباقي علينا</>,
                subSlogan: "كلش منظم بلا صداع راس. اكتشف أفضل قاعات الأفراح في الجزائر واحجز موعدك في لحظات.",
                ctaMain: "اكتشف القاعات",
                ourHalls: "أبرز القاعات المتاحة",
                btnBook: "احجز الآن",
                btnDates: "شوف المواعيد",
                langBtn: "English",
                location: "الجزائر العاصمة",
                hallTag: "ممتازة"
            },
            fr: {
                lang: "العربية",
                slogan1: "Organisez votre fête facilement",
                slogan2: "Réservez, on s'occupe du reste",
                desc: "Tout est organisé sans prise de tête. Découvrez les salles de mariage et d'événements les plus luxueuses d'Algérie.",
                bookNow: "Réserver",
                seeDates: "Voir les dates",
                ourHalls: "Découvrez nos salles",
                hall1Name: "Salle Princesse d'Argent",
                hall2Name: "Jardin des Rêves Extérieur",
                location1: "Alger",
                location2: "Oran",
                priceLabel: "À partir de",
                footerTitle: "Restons en contact",
                footerDesc: "Suivez-nous sur les réseaux sociaux pour découvrir nos dernières offres.",
                rights: "© 2026 Zaffa DZ. Tous droits réservés.",
                topRated: "Mieux Noté",
                ownerRegister: "Espace Propriétaires",
                visitors: "Visiteurs:",
                news1: "Ouverture des inscriptions pour les propriétaires de salles",
                news2: "Offres de lancement allant jusqu'à 20% de réduction",
                news3: "Réservez votre salle maintenant facilement avec Zaffa DZ",
                searchBtn: "Rechercher",
                city: "Wilaya",
                allCities: "Toutes les wilayas",
                guests: "Capacité",
                budget: "Budget (DZD)",
                capacityLabel: "personnes",
                wishlistTooltip: "Ajouter aux favoris",
                bookTitle: "Finaliser la réservation",
                selectDateLabel: "Choisissez la date (Jours dispo)",
                monthName: "Avril/Mai 2026",
                sat: "Sam", sun: "Dim", mon: "Lun", tue: "Mar", wed: "Mer", thu: "Jeu", fri: "Ven",
                paymentLabel: "Moyen de paiement (Avance: 50,000 DZD)",
                edahabia: "Carte Edahabia",
                cib: "Carte CIB",
                baridimob: "Application BaridiMob",
                confirmBooking: "Confirmer le paiement",
                cancel: "Annuler",
                bookingSuccess: "Félicitations! Votre paiement est réussi et la salle est réservée."
            }
        };

        const App = () => {
            const [lang, setLang] = useState('ar');
            const [wishlist, setWishlist] = useState([]);
            const [selectedHall, setSelectedHall] = useState(null);
            const [selectedDate, setSelectedDate] = useState(null);
            const [paymentMethod, setPaymentMethod] = useState(null);
            const [bookingSuccess, setBookingSuccess] = useState(false);

            const t = translations[lang];

            useEffect(() => {
                document.documentElement.setAttribute('lang', lang);
                document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
                document.body.setAttribute('lang', lang);
                document.title = lang === 'ar' ? "Zaffa DZ | زفة دي زاد" : "Zaffa DZ | Réservation de Salles";
            }, [lang]);

            const toggleLang = () => {
                setLang(prev => prev === 'ar' ? 'fr' : 'ar');
            };

            const toggleWishlist = (id) => {
                setWishlist(prev => prev.includes(id) ? prev.filter(wId => wId !== id) : [...prev, id]);
            };

            const openBooking = (hall) => {
                setSelectedHall(hall);
                setSelectedDate(null);
                setPaymentMethod(null);
                setBookingSuccess(false);
            };

            const confirmBooking = () => {
                setBookingSuccess(true);
                setTimeout(() => {
                    setSelectedHall(null);
                }, 3000);
            };

            const halls = [
                {
                    id: 1,
                    name: t.hall1Name,
                    location: t.location1,
                    image: './hall_1.png',
                    price: "450,000 DZD",
                    topRated: true,
                    capacity: 500,
                    parking: true,
                    ac: true,
                    catering: true,
                    bookedDays: [3, 4, 10, 15, 22] // Mock unavailable days (1-30)
                },
                {
                    id: 2,
                    name: t.hall2Name,
                    location: t.location2,
                    image: './hall_2.png',
                    price: "320,000 DZD",
                    topRated: false,
                    capacity: 350,
                    parking: true,
                    ac: true,
                    catering: false,
                    bookedDays: [1, 2, 8, 9, 14, 25] // Mock unavailable days
                }
            ];

            const renderCalendar = () => {
                // Mock simple calendar array (30 days total starting with empty spaces based on month)
                const days = [];
                // 3 empty days
                for (let i = 0; i < 3; i++) days.push({ empty: true, day: `e${i}` });
                // 30 actual days
                for (let i = 1; i <= 30; i++) {
                    const unavailable = selectedHall.bookedDays.includes(i);
                    days.push({ empty: false, day: i, unavailable });
                }

                return (
                    <div>
                        <p style={{ fontWeight: 600, marginBottom: '10px' }}>{t.selectDateLabel}</p>
                        <div className="calendar-header">
                            <button><i className={lang === 'ar' ? "fa-solid fa-angle-right" : "fa-solid fa-angle-left"}></i></button>
                            <span>{t.monthName}</span>
                            <button><i className={lang === 'ar' ? "fa-solid fa-angle-left" : "fa-solid fa-angle-right"}></i></button>
                        </div>
                        <div className="calendar-days-label">
                            <span>{t.sat}</span><span>{t.sun}</span><span>{t.mon}</span>
                            <span>{t.tue}</span><span>{t.wed}</span><span>{t.thu}</span><span>{t.fri}</span>
                        </div>
                        <div className="calendar-grid">
                            {days.map((d) => (
                                <div
                                    key={d.day}
                                    className={`calendar-day ${d.empty ? 'empty' : ''} ${d.unavailable ? 'unavailable' : ''} ${selectedDate === d.day ? 'selected' : ''}`}
                                    onClick={() => !d.empty && !d.unavailable && setSelectedDate(d.day)}
                                >
                                    {!d.empty && d.day}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderModal = () => {
                if (!selectedHall) return null;

                if (bookingSuccess) {
                    return (
                        <div className="modal-overlay">
                            <div className="booking-modal" style={{ textAlign: 'center', padding: '4rem 2rem' }}>
                                <i className="fa-solid fa-circle-check" style={{ fontSize: '5rem', color: '#25D366', marginBottom: '1.5rem' }}></i>
                                <h2 className="modal-title" style={{ justifyContent: 'center' }}>{t.bookingSuccess}</h2>
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="modal-overlay">
                        <div className="booking-modal">
                            <button className="close-modal" onClick={() => setSelectedHall(null)}><i className="fa-solid fa-xmark"></i></button>
                            <h2 className="modal-title"><i className="fa-regular fa-calendar-check"></i> {t.bookTitle}</h2>
                            <div className="modal-hall">{selectedHall.name} - {selectedHall.location}</div>

                            {renderCalendar()}

                            {selectedDate && (
                                <div className="fade-in">
                                    <p style={{ fontWeight: 600, marginBottom: '10px' }}>{t.paymentLabel}</p>
                                    <div className="payment-options">
                                        <div className={`payment-card ${paymentMethod === 'edahabia' ? 'selected' : ''}`} onClick={() => setPaymentMethod('edahabia')}>
                                            <div className="payment-info">
                                                <i className="fa-regular fa-credit-card"></i>
                                                <span>{t.edahabia}</span>
                                            </div>
                                        </div>
                                        <div className={`payment-card ${paymentMethod === 'cib' ? 'selected' : ''}`} onClick={() => setPaymentMethod('cib')}>
                                            <div className="payment-info">
                                                <i className="fa-solid fa-building-columns"></i>
                                                <span>{t.cib}</span>
                                            </div>
                                        </div>
                                        <div className={`payment-card ${paymentMethod === 'baridimob' ? 'selected' : ''}`} onClick={() => setPaymentMethod('baridimob')}>
                                            <div className="payment-info">
                                                <i className="fa-solid fa-mobile-screen"></i>
                                                <span>{t.baridimob}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="booking-actions">
                                        <button className="btn-cancel" onClick={() => setSelectedHall(null)}>{t.cancel}</button>
                                        <button className="btn-confirm" disabled={!paymentMethod} onClick={confirmBooking}>
                                            <i className="fa-solid fa-lock"></i> {t.confirmBooking}
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div>
                    <div className="top-bar">
                        <div className="top-bar-info">
                            <span><i className="fa-solid fa-users"></i> {t.visitors} 12,045</span>
                        </div>
                        <div className="top-bar-info" style={{ gap: '1.5rem' }}>
                            <span><i className="fa-solid fa-envelope"></i> contact@zaffadz.com</span>
                            <span className="hide-mobile"><i className="fa-solid fa-phone"></i> +213 555 12 34 56</span>
                        </div>
                    </div>
                    <div className="ticker-wrap">
                        <marquee direction={lang === 'ar' ? 'right' : 'left'} scrollamount="6">
                            <span style={{ marginInlineEnd: '5rem' }}>
                                <i className="fa-solid fa-bell" style={{ marginInlineEnd: '8px' }}></i>
                                {t.news1}
                            </span>
                            <span style={{ marginInlineEnd: '5rem' }}>
                                <i className="fa-solid fa-bell" style={{ marginInlineEnd: '8px' }}></i>
                                {t.news2}
                            </span>
                            <span style={{ marginInlineEnd: '5rem' }}>
                                <i className="fa-solid fa-bell" style={{ marginInlineEnd: '8px' }}></i>
                                {t.news3}
                            </span>
                        </marquee>
                    </div>
                    <nav className="navbar">
                        <div className="logo">
                            <img src="./logo.png" alt="Zaffa DZ Logo" />
                            <span>Zaffa DZ</span>
                        </div>
                        <div className="nav-actions">
                            <a href="./partner.html" className="btn-owner" title={t.ownerRegister}>
                                <i className="fa-solid fa-user-tie"></i>
                                <span className="hide-mobile">{t.ownerRegister}</span>
                            </a>
                            <button className="lang-switch" onClick={toggleLang}>
                                <i className="fa-solid fa-globe"></i>
                                {t.lang}
                            </button>
                        </div>
                    </nav>

                    <section className="hero">
                        <h1>{t.slogan1}</h1>
                        <h2>{t.slogan2}</h2>
                        <p>{t.desc}</p>
                        <div className="hero-buttons">
                            <button className="btn-primary" onClick={() => openBooking(halls[0])}>
                                <i className="fa-regular fa-calendar-check"></i>
                                {t.bookNow}
                            </button>
                            <button className="btn-secondary" onClick={() => openBooking(halls[0])}>
                                <i className="fa-regular fa-clock"></i>
                                {t.seeDates}
                            </button>
                        </div>
                    </section>

                    <div className="search-bar-container">
                        <div className="search-input-group">
                            <label><i className="fa-solid fa-location-dot"></i> {t.city}</label>
                            <select>
                                <option value="">{t.allCities}</option>
                                <option value="algiers">{t.location1}</option>
                                <option value="oran">{t.location2}</option>
                            </select>
                        </div>
                        <div className="search-input-group">
                            <label><i className="fa-solid fa-users"></i> {t.guests}</label>
                            <select>
                                <option value="">---</option>
                                <option value="100">100 - 300</option>
                                <option value="300">300 - 500</option>
                                <option value="500">+500</option>
                            </select>
                        </div>
                        <div className="search-input-group">
                            <label><i className="fa-solid fa-wallet"></i> {t.budget}</label>
                            <input type="text" placeholder="..." />
                        </div>
                        <button className="btn-search">
                            <i className="fa-solid fa-magnifying-glass"></i> {t.searchBtn}
                        </button>
                    </div>

                    <section className="halls-section" style={{ paddingTop: '2rem' }}>
                        <h3 className="section-title">{t.ourHalls}</h3>
                        <div className="halls-grid">
                            {halls.map(hall => (
                                <div className="hall-card" key={hall.id}>
                                    <div className="img-container">
                                        {hall.topRated && <div className="badge"><i className="fa-solid fa-star" style={{ color: '#fff', marginInlineEnd: '4px' }}></i>{t.topRated}</div>}
                                        <button
                                            className={`btn-wishlist ${wishlist.includes(hall.id) ? 'active' : ''}`}
                                            onClick={() => toggleWishlist(hall.id)}
                                            title={t.wishlistTooltip}
                                        >
                                            <i className={wishlist.includes(hall.id) ? "fa-solid fa-heart" : "fa-regular fa-heart"}></i>
                                        </button>
                                        <img src={hall.image} alt={hall.name} className="hall-img" />
                                    </div>
                                    <div className="hall-info">
                                        <h3 className="hall-name">
                                            {lang === 'ar' ? hall.nameAr : hall.nameFr}
                                        </h3>
                                        <p className="hall-location">
                                            <i className="fas fa-map-marker-alt"></i>
                                            {t.location}
                                        </p>
                                        <div className="hall-actions">
                                            <a href="#" className="btn-card btn-book">{t.btnBook}</a>
                                            <a href="#" className="btn-card btn-dates">{t.btnDates}</a>
                                        </div>
                                        <div className="amenities-row">
                                            <span className="amenity" title="Capacity"><i className="fa-solid fa-users-line"></i> {hall.capacity} {t.capacityLabel}</span>
                                            {hall.parking && <span className="amenity" title="Parking"><i className="fa-solid fa-square-parking"></i></span>}
                                            {hall.ac && <span className="amenity" title="Air Conditioning"><i className="fa-solid fa-snowflake"></i></span>}
                                            {hall.catering && <span className="amenity" title="Catering"><i className="fa-solid fa-utensils"></i></span>}
                                        </div>
                                        <div className="hall-footer">
                                            <div>
                                                <span className="price-label">{t.priceLabel}</span>
                                                <div className="price">{hall.price}</div>
                                            </div>
                                            <button className="btn-primary" style={{ padding: '0.8rem 2rem', fontSize: '1.1rem' }} onClick={() => openBooking(hall)}>
                                                {t.bookNow}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {renderModal()}

                    <footer className="footer">
                        <div className="footer-content">
                            <div className="footer-text">
                                <h3>{t.footerTitle}</h3>
                                <p style={{ opacity: 0.9, maxWidth: '400px', fontSize: '1.1rem' }}>{t.footerDesc}</p>
                            </div>
                            <div className="social-links">
                                <a href="#" className="social-link instagram" title="Instagram"><i className="fa-brands fa-instagram"></i></a>
                                <a href="#" className="social-link tiktok" title="TikTok"><i className="fa-brands fa-tiktok"></i></a>
                                <a href="#" className="social-link whatsapp" title="WhatsApp"><i className="fa-brands fa-whatsapp"></i></a>
                                <a href="#" className="social-link gps" title="GPS"><i className="fa-solid fa-map-location-dot"></i></a>
                            </div>
                        </div>
                        <div className="copyright">
                            {t.rights}
                        </div>
                    </footer>
                    <a href="https://wa.me/213555123456" className="floating-whatsapp" target="_blank" rel="noopener noreferrer">
                        <i className="fa-brands fa-whatsapp"></i>
                    </a>
                </div>
            );
        };

        // رندرينغ للتطبيق داخل الـ root div
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
